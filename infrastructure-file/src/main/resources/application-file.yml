# local file 설정
file:
  upload:
    path: images/
  down:
    path: http://localhost:9002/static/

# AWS S3 설정
cloud:
  aws:
    s3:
      bucket: diydriller-s3
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_ACCESS_KEY_SECRET}
    region:
      static: ap-northeast-2
    stack:
      auto: false