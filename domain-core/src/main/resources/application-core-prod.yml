spring:
  # 데이터베이스 설정
  datasource:
    source:
      url:
      username:
      password:
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10

  # jpa 설정
  jpa:
    database: mysql
    hibernate:
      ddl-auto: validate
    generate-ddl: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

# redis 설정
redis:
  port: 6379
  host:
  password:
  lettuce:
    pool:
      max-idle: 8
      min-idle: 2
      max-active: 8